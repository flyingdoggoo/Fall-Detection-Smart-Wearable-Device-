<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fall Detection Monitor - WEDA Compatible</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0e0e0e 0%, #000000 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            color: #191a1e;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 600;
        }

        .status-indicator.connected {
            background: #10b981;
            color: white;
        }

        .status-indicator.disconnected {
            background: #ef4444;
            color: white;
        }

        .pulse {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: white;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .settings {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .settings input {
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            flex: 1;
            min-width: 250px;
        }

        .settings button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .settings button:hover {
            background: #5568d3;
        }

        .settings button.danger {
            background: #ef4444;
        }

        .settings button.danger:hover {
            background: #dc2626;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-card h4 {
            /* color: #667eea; */
            font-size: 14px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }

        .stat-card .unit {
            color: #666;
            font-size: 12px;
        }

        .charts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-wrapper {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .chart-wrapper h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .chart-wrapper canvas {
            max-height: 300px;
        }

        @media (max-width: 1200px) {
            .charts-container {
                grid-template-columns: 1fr;
            }
        }

        .log-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-height: 300px;
            overflow-y: auto;
        }

        .log-container h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .log-entry {
            padding: 8px 12px;
            border-left: 3px solid #667eea;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .log-entry .timestamp {
            color: #667eea;
            font-weight: bold;
        }

        .session-info {
            background: #f0f9ff;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 13px;
            color: #0369a1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span>Fall Detection Monitor V2</span>
            </h1>
            <div class="status">
                <div class="status-indicator" id="statusIndicator">
                    <div class="pulse"></div>
                    <span id="statusText">Đang kết nối...</span>
                </div>
                <div class="session-info" id="sessionInfo">
                    Session: <strong id="sessionId">None</strong> | 
                    Packets: <strong id="dataCount">0</strong>
                </div>
            </div>
        </div>

        <div class="settings">
            <input type="text" id="serverUrl" value="http://192.168.1.4:3000" placeholder="http://IP:PORT">
            <button onclick="reconnect()">Kết nối lại</button>
            
            
            
            <button onclick="startSession()" class="success">▶Start Session</button>
            <button onclick="stopSession()" class="danger">⏹Stop Session</button>
        </div>  

        <div class="stats-grid">
            <div class="stat-card">
                <h4>HEART RATE</h4>
                <div class="value" id="bpm">--</div>
                <div class="unit">BPM</div>
            </div>
            <div class="stat-card">
                <h4>MAGNITUDE</h4>
                <div class="value" id="magnitude">--</div>
                <div class="unit">m/s²</div>
            </div>
            <div class="stat-card">
                <h4>SMA</h4>
                <div class="value" id="sma">--</div>
                <div class="unit">avg</div>
            </div>
            <div class="stat-card">
                <h4>MAX ACCEL</h4>
                <div class="value" id="maxAccel">--</div>
                <div class="unit">m/s²</div>
            </div>
            <div class="stat-card">
                <h4>MAX GYRO</h4>
                <div class="value" id="maxGyro">--</div>
                <div class="unit">rad/s</div>
            </div>
            <div class="stat-card">
                <h4>WINDOW SIZE</h4>
                <div class="value" id="windowSize">--</div>
                <div class="unit">samples</div>
            </div>
        </div>

        <div class="charts-container">
            <div class="chart-wrapper">
                <h3>Accelerometer (m/s²)</h3>
                <canvas id="accelChart"></canvas>
            </div>
            <div class="chart-wrapper">
                <h3>Gyroscope (rad/s)</h3>
                <canvas id="gyroChart"></canvas>
            </div>
            <div class="chart-wrapper">
                <h3>Magnitude & SMA</h3>
                <canvas id="magnitudeChart"></canvas>
            </div>
            <div class="chart-wrapper">
                <h3>Heart Rate (BPM)</h3>
                <canvas id="bpmChart"></canvas>
            </div>
        </div>

        <div class="log-container">
            <h3>Event Log</h3>
            <div id="logEntries"></div>
        </div>
    </div>

    <script>
        let socket;
        let dataCount = 0;
        let currentSessionId = null;
        const maxLogEntries = 30;
        const maxChartData = 50;

        // Chart configurations
        const chartConfig = {
            accel: null,
            gyro: null,
            magnitude: null,
            bpm: null
        };

        function initCharts() {
            const commonOptions = {
                responsive: true,
                maintainAspectRatio: true,
                animation: false,
                scales: {
                    x: { display: true },
                    y: { display: true }
                },
                plugins: {
                    legend: { display: true, position: 'top' }
                }
            };

            // Accelerometer Chart
            chartConfig.accel = new Chart(document.getElementById('accelChart'), {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'X', data: [], borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.1)', tension: 0.4 },
                        { label: 'Y', data: [], borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', tension: 0.4 },
                        { label: 'Z', data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', tension: 0.4 }
                    ]
                },
                options: commonOptions
            });

            // Gyroscope Chart
            chartConfig.gyro = new Chart(document.getElementById('gyroChart'), {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'X', data: [], borderColor: '#f97316', backgroundColor: 'rgba(249, 115, 22, 0.1)', tension: 0.4 },
                        { label: 'Y', data: [], borderColor: '#8b5cf6', backgroundColor: 'rgba(139, 92, 246, 0.1)', tension: 0.4 },
                        { label: 'Z', data: [], borderColor: '#ec4899', backgroundColor: 'rgba(236, 72, 153, 0.1)', tension: 0.4 }
                    ]
                },
                options: commonOptions
            });

            // Magnitude Chart
            chartConfig.magnitude = new Chart(document.getElementById('magnitudeChart'), {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'Magnitude', data: [], borderColor: '#667eea', backgroundColor: 'rgba(102, 126, 234, 0.1)', tension: 0.4, fill: true },
                        { label: 'SMA', data: [], borderColor: '#fbbf24', backgroundColor: 'rgba(251, 191, 36, 0.1)', tension: 0.4 }
                    ]
                },
                options: commonOptions
            });

            // BPM Chart
            chartConfig.bpm = new Chart(document.getElementById('bpmChart'), {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'BPM', data: [], borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.2)', tension: 0.4, fill: true }
                    ]
                },
                options: commonOptions
            });
        }

        function updateChart(chart, timestamp, ...values) {
            chart.data.labels.push(timestamp);
            values.forEach((value, index) => {
                chart.data.datasets[index].data.push(value);
            });

            // Limit data points
            if (chart.data.labels.length > maxChartData) {
                chart.data.labels.shift();
                chart.data.datasets.forEach(dataset => dataset.data.shift());
            }

            chart.update('none');
        }

        function connect() {
            const serverUrl = document.getElementById('serverUrl').value;
            
            if (socket) {
                socket.disconnect();
            }

            socket = io(serverUrl);

            socket.on('connect', () => {
                console.log('✓ Connected to server');
                updateStatus(true);
                addLogEntry('System', 'Connected to server');
            });

            socket.on('disconnect', () => {
                console.log('✗ Disconnected from server');
                updateStatus(false);
                addLogEntry('System', 'Disconnected from server', 'error');
            });

            // Legacy single sample (nếu còn dùng)
            socket.on('sensorData', (data) => {
                dataCount++;
                document.getElementById('dataCount').textContent = dataCount;
                
                if (data.bpm !== undefined) {
                    document.getElementById('bpm').textContent = data.bpm;
                    updateChart(chartConfig.bpm, new Date().toLocaleTimeString(), data.bpm);
                }
            });

            // NEW: Batch data handler
            socket.on('sensorBatch', (batch) => {
                dataCount++;
                document.getElementById('dataCount').textContent = dataCount;

                // Update stats
                if (batch.bpm !== undefined) {
                    document.getElementById('bpm').textContent = batch.bpm;
                }
                if (batch.features) {
                    document.getElementById('magnitude').textContent = batch.features.magnitude_avg?.toFixed(2) || '--';
                    document.getElementById('sma').textContent = batch.features.sma?.toFixed(2) || '--';
                    document.getElementById('maxAccel').textContent = batch.features.max_accel?.toFixed(2) || '--';
                    document.getElementById('maxGyro').textContent = batch.features.max_gyro?.toFixed(2) || '--';
                }
                if (batch.window_size) {
                    document.getElementById('windowSize').textContent = batch.window_size;
                }

                // Update charts with averaged window data (để không quá nhiều điểm)
                const timestamp = new Date().toLocaleTimeString();
                
                if (batch.accel_data && batch.accel_data.length > 0) {
                    const lastAccel = batch.accel_data[batch.accel_data.length - 1];
                    updateChart(chartConfig.accel, timestamp, lastAccel.x, lastAccel.y, lastAccel.z);
                }

                if (batch.gyro_data && batch.gyro_data.length > 0) {
                    const lastGyro = batch.gyro_data[batch.gyro_data.length - 1];
                    updateChart(chartConfig.gyro, timestamp, lastGyro.x, lastGyro.y, lastGyro.z);
                }

                if (batch.features) {
                    updateChart(chartConfig.magnitude, timestamp, 
                        batch.features.magnitude_avg || 0, 
                        batch.features.sma || 0
                    );
                }

                if (batch.bpm !== undefined) {
                    updateChart(chartConfig.bpm, timestamp, batch.bpm);
                }

                addLogEntry('Data', `Window received: ${batch.window_size} samples | Mag: ${batch.features?.magnitude_avg?.toFixed(2)} | BPM: ${batch.bpm}`);
            });

            socket.on('connect_error', (error) => {
                console.error('Connection error:', error);
                updateStatus(false);
            });
        }

        function updateStatus(connected) {
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            
            if (connected) {
                indicator.className = 'status-indicator connected';
                statusText.textContent = 'Connected';
            } else {
                indicator.className = 'status-indicator disconnected';
                statusText.textContent = 'Disconnected';
            }
        }

        function addLogEntry(type, message, level = 'info') {
            const logContainer = document.getElementById('logEntries');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            const time = new Date().toLocaleTimeString('vi-VN');
            const emoji = level === 'error' ? '❌' : level === 'warning' ? '⚠️' : '✓';
            
            entry.innerHTML = `
                <span class="timestamp">[${time}]</span> ${emoji} <strong>${type}:</strong> ${message}
            `;
            
            logContainer.insertBefore(entry, logContainer.firstChild);
            
            while (logContainer.children.length > maxLogEntries) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }

        async function startSession() {
            const serverUrl = document.getElementById('serverUrl').value;
            
            try {
                const response = await fetch(`${serverUrl}/api/session/start`, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                if (data.success) {
                    currentSessionId = data.session_id;
                    document.getElementById('sessionId').textContent = currentSessionId;
                    const labelText = data.label === '1' ? '🔴 FALL' : '🟢 NORMAL';
                    addLogEntry('Session', `Started: ${currentSessionId} [Label: ${data.label} - ${labelText}]`, 'info');
                }
            } catch (error) {
                addLogEntry('Session', `Failed to start: ${error.message}`, 'error');
            }
        }

        async function stopSession() {
            const serverUrl = document.getElementById('serverUrl').value;
            try {
                const response = await fetch(`${serverUrl}/api/session/stop`, { method: 'POST' });
                const data = await response.json();
                if (data.success) {
                    addLogEntry('Session', `Stopped: ${currentSessionId}`, 'info');
                    currentSessionId = null;
                    document.getElementById('sessionId').textContent = 'None';
                }
            } catch (error) {
                addLogEntry('Session', `Failed to stop: ${error.message}`, 'error');
            }
        }

        function reconnect() {
            connect();
        }

        window.onload = () => {
            initCharts();
            connect();
            addLogEntry('System', 'Application initialized');
        };
    </script>
</body>
</html>
